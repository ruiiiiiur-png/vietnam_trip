    :root {
      --sun: #ffc93c;
      --coral: #ff6b4a;
      --magenta: #ff2d88;
      --pool: #00c9bf;
      --lime: #c4f000;
      --papaya: #fff0e5;
      --surf: #e8fff8;
      --orchid: #ffe0f0;
      --text: #2d1f3d;
      --muted: #6b5a7a;
      --card: rgba(255, 255, 255, 0.94);
      --border: rgba(255, 107, 74, 0.28);
      --glow-coral: 0 12px 36px rgba(255, 107, 74, 0.2);
      --glow-pool: 0 8px 28px rgba(0, 201, 191, 0.18);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Nunito", "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      line-height: 1.55;
      min-height: 100vh;

        radial-gradient(90% 50% at 105% 5%, rgba(255, 45, 136, 0.38), transparent 48%),
        radial-gradient(80% 45% at 50% 110%, rgba(0, 201, 191, 0.35), transparent 55%),
        radial-gradient(60% 40% at 0% 80%, rgba(196, 240, 0, 0.22), transparent 45%),
        linear-gradient(168deg, #fff9f2 0%, #fff5fb 38%, #f2fffc 100%);
      background-attachment: fixed;
    }
    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 1.35rem 1rem 3rem;
    }
    header {
      margin-bottom: 1.35rem;
      padding: 1rem 1.1rem 1.15rem;
      border-radius: 20px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.92) 0%, rgba(255, 240, 250, 0.88) 100%);
      border: 2px solid rgba(255, 201, 60, 0.45);
      box-shadow: var(--glow-coral), var(--glow-pool);
    }
    header h1 {
      font-size: 1.5rem;
      font-weight: 800;
      margin: 0 0 0.4rem;
      letter-spacing: 0.02em;
      line-height: 1.2;
      background: linear-gradient(105deg, #ff2d88 0%, #ff6b4a 40%, #ffc93c 85%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    header p {
      margin: 0;
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 600;
    }
    .flight-strip {
      display: grid;
      gap: 0.45rem;
      margin-top: 0.85rem;
      font-size: 0.84rem;
      font-weight: 600;
      color: var(--text);
    }
    .flight-strip span {
      color: #e0006f;
      font-weight: 800;
    }
    .day {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 20px;
      padding: 1.05rem 1.15rem;
      margin-bottom: 0.9rem;
      box-shadow: 0 4px 20px rgba(255, 107, 74, 0.08);
      backdrop-filter: blur(8px);
    }
    .day-head {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 0.35rem 0.75rem;
      margin-bottom: 0.65rem;
    }
    .day-tag {
      font-size: 0.72rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #fff;
      background: linear-gradient(90deg, var(--pool), #00e5c5);
      padding: 0.2rem 0.5rem;
      border-radius: 999px;
      box-shadow: 0 2px 10px rgba(0, 201, 191, 0.35);
    }
    .day-title {
      font-size: 1.08rem;
      font-weight: 800;
    }
    .day-date {
      font-size: 0.86rem;
      color: var(--muted);
      font-weight: 600;
    }
    .weather-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }
    .wx {
      font-size: 0.8rem;
      font-weight: 600;
      background: linear-gradient(135deg, rgba(0, 201, 191, 0.15), rgba(255, 201, 60, 0.2));
      border: 2px solid rgba(0, 201, 191, 0.35);
      border-radius: 12px;
      padding: 0.4rem 0.65rem;
      color: #0a6b63;

    .wx.loading {
      color: var(--muted);

    }
    .wx.err {
      border-color: rgba(255, 107, 74, 0.55);
      color: #c43a1a;
      background: rgba(255, 240, 230, 0.9);
    }
    .wx strong {
      color: #e0006f;
    }

    }
    .meta {
      font-size: 0.88rem;
      color: #55486a;
      margin-top: 0.55rem;

    .meta b {
      color: #00a89a;
      font-weight: 800;

      font-size: 0.76rem;

      color: #e0006f;
      font-weight: 700;
    }

      margin: 0 0 0.55rem;
      font-weight: 800;

      font-weight: 600;

      font-weight: 700;

    .day-tab {

      font-weight: 700;

      line-height: 1.2;
      text-align: center;

    .day-tab:hover {
      border-color: var(--magenta);
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(255, 45, 136, 0.2);
    }
    .day-tab[aria-selected="true"] {
      border-color: transparent;
      background: linear-gradient(135deg, #ff2d88 0%, #ff6b4a 50%, #ffc93c 100%);
      color: #fff;
      box-shadow: 0 8px 26px rgba(255, 45, 136, 0.45);
      transform: translateY(-1px);

    .day-tab .tab-n {
      display: block;
      font-weight: 800;
      color: #00a89a;
      font-size: clamp(0.58rem, 1.6vw, 0.68rem);
      letter-spacing: 0.02em;
      white-space: nowrap;
    }
    .day-tab[aria-selected="true"] .tab-n,
    .day-tab[aria-selected="true"] .tab-d {
      color: #fff;
    }
    .day-tab .tab-d {
      display: block;
      font-size: clamp(0.55rem, 1.5vw, 0.65rem);
      color: var(--muted);
      margin-top: 0.08rem;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;

    .day-tab .tab-ico {
      font-size: clamp(0.85rem, 2.4vw, 1.02rem);
      line-height: 1;
      display: block;
      margin-bottom: 0.08rem;

    .day-title .de {
      margin-right: 0.35rem;
    }
    .day-panel {
      display: none;
    }
    .day-panel.is-active {
      display: block;
    }
    .city-tips {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.96) 0%, rgba(255, 224, 240, 0.5) 100%);

      border-radius: 20px;
      margin-top: 1rem;
      overflow: hidden;
      box-shadow: 0 6px 28px rgba(255, 45, 136, 0.1);

    .city-tips > summary {
      list-style: none;
      cursor: pointer;
      padding: 0.85rem 2.2rem 0.85rem 1.05rem;
      position: relative;
      user-select: none;
      border-bottom: 2px solid transparent;
    }
    .city-tips > summary::-webkit-details-marker {
      display: none;
    }
    .city-tips[open] > summary {
      border-bottom-color: rgba(255, 107, 74, 0.2);
    }
    .city-tips > summary:hover {
      background: rgba(255, 201, 60, 0.15);
    }
    .city-tips-summary .st {
      font-weight: 800;
      font-size: 1rem;
      background: linear-gradient(90deg, #ff2d88, #ff6b4a);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .city-tips-summary .sub {
      font-size: 0.84rem;
      color: var(--muted);
      display: block;
      margin-top: 0.25rem;
      font-weight: 700;
    }
    .city-tips-summary::after {
      content: "▼";
      position: absolute;
      right: 0.95rem;
      top: 50%;
      margin-top: -0.35em;
      font-size: 0.55rem;
      color: #ff2d88;
      font-weight: 800;
      transition: transform 0.2s;
    }
    .city-tips[open] > summary::after {
      transform: rotate(-180deg);
    }
    .city-tips-body {
      padding: 0.7rem 1.05rem 1.05rem;
      font-size: 0.89rem;
      color: #55486a;
      font-weight: 600;
    }
    .tip-block {
      padding: 0.55rem 0;
      border-top: 2px dashed rgba(255, 107, 74, 0.22);
    }
    .tip-block:first-child {
      border-top: 0;
      padding-top: 0.2rem;
    }
    .tip-block h4 {
      margin: 0 0 0.4rem;
      font-size: 0.95rem;
      color: #00a89a;
      font-weight: 800;
    }
    .tip-block p {
      margin: 0 0 0.45rem;
    }
    .tip-block p:last-child {
      margin-bottom: 0;
    }
    .tip-block .k {
      color: #ff2d88;
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      display: block;
      margin-bottom: 0.22rem;
    }
  </style>
</head>

  <script>
    const YEAR = 2026;

    const wmoZh = (code) => {
      if (code === 0) return "晴";
      if (code <= 3) return "少云 / 多云";
      if (code <= 48) return "雾或霾";
      if (code <= 57) return "毛毛雨 / 冻毛毛雨";
      if (code <= 67) return "雨";
      if (code <= 77) return "降雪或阵雨";
      if (code <= 82) return "阵雨";
      if (code <= 86) return "阵雪";
      if (code <= 99) return "雷暴或强降水";
      return "天气码 " + code;
    };

    const dayCardEmoji = (n) =>
      ["✈️", "⛪", "🏖️", "🌴", "🏜️", "🎭", "🛫"][n - 1] || "📍";

        午餐: "🍜",
        晚间: "🌙",
        清晨: "🌄",
        说明: "📋",
      };
      return (m[h] || "📌") + " " + h;

      },
      {
        n: 5,
        date: `${YEAR}-05-03`,
        label: "5月3日 周六",
        title: "美奈",
        wxKeys: ["muine"],
        blocks: [
          { h: "上午", items: ["自由活动"] },
          { h: "下午", items: [

          { h: "晚间", items: ["返回酒店"] },
        ],
        meals: "早：酒店 · 午：自理 · 晚：自理",
        hotel: "Centara Mirage Resort Mui Ne",
      },
      {
        n: 6,
        date: `${YEAR}-05-04`,
        label: "5月4日 周日",
        title: "美奈 → 胡志明市",
        wxKeys: ["muine", "hcmc"],
        blocks: [
          { h: "上午", items: ["早餐后乘车前往胡志明市（「东方小巴黎」）"] },
          { h: "午餐", items: ["特色海鲜自助欢送午宴"] },
          { h: "下午", items: [

      },
      {
        n: 7,
        date: `${YEAR}-05-05`,
        label: "5月5日 周一",
        title: "胡志明市 → 上海",
        wxKeys: ["hcmc"],
        blocks: [
          { h: "清晨", items: [
            "打包早餐，送国际机场（行程文案若写「河内机场」应为笔误，实际为胡志明新山一机场）",
            "航班 VN 524：07:20 起飞 — 12:40 抵达浦东（以最终出票为准）",
          ]},
        ],
        meals: "早：打包早餐",
        hotel: "—",

    const tripMapState = { map: null, overlay: null };

    function initTripMap() {
      if (typeof L === "undefined" || !document.getElementById("trip-map")) return;
      const iconBase = "https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/";
      delete L.Icon.Default.prototype._getIconUrl;
      L.Icon.Default.mergeOptions({
        iconRetinaUrl: iconBase + "marker-icon-2x.png",
        iconUrl: iconBase + "marker-icon.png",
        shadowUrl: iconBase + "marker-shadow.png",
      });

      const map = L.map("trip-map", { scrollWheelZoom: false });
      L.tileLayer(
        "https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png",
        {
          attribution:
            '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
          subdomains: "abcd",
          maxZoom: 19,
        }
      ).addTo(map);

      tripMapState.map = map;
      tripMapState.overlay = L.layerGroup().addTo(map);

      map.on("click", () => {
        if (!map.scrollWheelZoom.enabled()) map.scrollWheelZoom.enable();
      });
    }

    function padBounds(lat, lon, delta) {
      return L.latLngBounds([lat - delta, lon - delta], [lat + delta, lon + delta]);
    }

    function updateMapForDayIndex(idx) {
      const d = days[idx];
      const mapEl = document.getElementById("trip-map");
      const ctx = document.getElementById("map-context");
      if (ctx) {
        ctx.textContent =
          "📍 当前：Day " + d.n + " · " + d.label + " · " + d.wxKeys.map((k) => cities[k].name).join(" → ");
      }
      if (mapEl) {
        mapEl.setAttribute(
          "aria-label",
          "Day " + d.n + " " + d.label + "：" + d.title + "，涉及 " + d.wxKeys.map((k) => cities[k].name).join("、")
        );
      }

      if (!tripMapState.map || !tripMapState.overlay) return;
      tripMapState.overlay.clearLayers();

      const keys = d.wxKeys;
      const latlngs = keys.map((k) => [cities[k].lat, cities[k].lon]);

      if (latlngs.length > 1) {
        L.polyline(latlngs, {
          color: "#ff2d88",
          weight: 4,
          opacity: 0.92,
          dashArray: "12 8",
        }).addTo(tripMapState.overlay);
      }

      keys.forEach((k, i) => {
        const c = cities[k];
        const seq = keys.length > 1 ? i + 1 + ". " : "";
        const html =
          "<strong>" +
          seq +
          "📍 " +
          c.name +
          "</strong><br><span style=\"opacity:.9;font-size:12px\">Day " +
          d.n +
          " · " +
          d.title +
          " ✨</span>";
        L.marker([c.lat, c.lon]).addTo(tripMapState.overlay).bindPopup(html);
      });

      let b;
      if (latlngs.length === 1) {
        b = padBounds(latlngs[0][0], latlngs[0][1], 0.09);
      } else {
        b = L.latLngBounds(latlngs);
      }
      tripMapState.map.fitBounds(b, {
        padding: [36, 36],
        maxZoom: latlngs.length === 1 ? 12 : 8,
      });
    }

    let selectedDayIndex = 0;

    function renderCityTips(dayIndex) {
      const d = days[dayIndex];
      const det = document.getElementById("city-tips");
      const label = document.getElementById("city-tips-label");
      const body = document.getElementById("city-tips-body");
      if (!label || !body) return;

      const wasOpen = det ? det.open : false;
      const keys = d.wxKeys.filter((k, i, a) => a.indexOf(k) === i);

      label.textContent =
        "🧭 本日涉及：" + keys.map((k) => tipCityEmoji[k] + " " + cities[k].name).join(" · ");

      body.innerHTML = keys
        .map((k) => {
          const t = cityTips[k];
          if (!t) return "";
          const ico = tipCityEmoji[k] || "📍";
          return (
            '<article class="tip-block">' +
            "<h4>" +
            ico +
            " " +
            t.title +
            "</h4>" +
            '<p><span class="k">📜 历史脉络</span>' +
            t.history +
            "</p>" +
            '<p><span class="k">✨ 在地特色</span>' +
            t.features +
            "</p>" +
            "</article>"
          );
        })
        .join("");

      if (det && wasOpen) det.open = true;
    }

    function selectDay(index) {
      if (index < 0 || index >= days.length) return;
      selectedDayIndex = index;

      document.querySelectorAll(".day-tab").forEach((btn, i) => {
        btn.setAttribute("aria-selected", i === index ? "true" : "false");
      });
      document.querySelectorAll(".day-panel").forEach((panel, i) => {
        panel.classList.toggle("is-active", i === index);
      });

      updateMapForDayIndex(index);
      renderCityTips(index);
    }

    async function fetchCityRange(key, start, end) {
      const c = cities[key];
      const u = new URL("https://api.open-meteo.com/v1/forecast");
      u.searchParams.set("latitude", c.lat);
      u.searchParams.set("longitude", c.lon);
      u.searchParams.set("daily", "weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max");
      u.searchParams.set("timezone", "Asia/Ho_Chi_Minh");
      u.searchParams.set("start_date", start);
      u.searchParams.set("end_date", end);
      const r = await fetch(u.toString());
      if (!r.ok) throw new Error(key);
      const j = await r.json();
      const map = {};
      const t = j.daily.time;
      for (let i = 0; i < t.length; i++) {
        map[t[i]] = {
          wmo: j.daily.weathercode[i],
          max: j.daily.temperature_2m_max[i],
          min: j.daily.temperature_2m_min[i],
          pop: j.daily.precipitation_probability_max[i],
        };
      }
      return map;
    }

    function renderWxEl(container, dateStr, wxKeys, cache) {
      container.innerHTML = "";
      wxKeys.forEach((k) => {
        const el = document.createElement("span");
        el.className = "wx loading";
        el.textContent = "⏳ " + cities[k].name + "：加载中…";
        container.appendChild(el);
      });

      wxKeys.forEach((el, idx) => {
        const span = container.children[idx];
        const row = cache[wxKeys[idx]] && cache[wxKeys[idx]][dateStr];
        if (!row) {
          span.className = "wx err";
          span.textContent = "😅 " + cities[wxKeys[idx]].name + "：暂无数据";
          return;
        }
        span.className = "wx";
        span.innerHTML =
          "🌤️ <strong>" + cities[wxKeys[idx]].name + "</strong> " +
          wmoZh(row.wmo) +
          " · " +
          Math.round(row.min) + "–" + Math.round(row.max) + "°C" +
          " · 降水概率 " + (row.pop != null ? row.pop : "—") + "%";
      });
    }

    const start = days[0].date;
    const end = days[days.length - 1].date;
    const keys = [...new Set(days.flatMap((d) => d.wxKeys))];

    const picker = document.getElementById("day-picker");
    const root = document.getElementById("days");

    const lbl = document.createElement("span");
    lbl.className = "pick-label";
    lbl.textContent = "📅 选择第几天";
    picker.appendChild(lbl);

    const tabRow = document.createElement("div");
    tabRow.className = "day-tab-row";
    tabRow.setAttribute("role", "tablist");
    tabRow.setAttribute("aria-label", "七天行程切换");
    picker.appendChild(tabRow);

    days.forEach((d, i) => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "day-tab";
      btn.setAttribute("role", "tab");
      btn.setAttribute("aria-selected", i === 0 ? "true" : "false");
      btn.setAttribute("id", "day-tab-" + d.n);
      btn.setAttribute("aria-controls", "day-panel-" + d.n);
      btn.innerHTML =
        '<span class="tab-ico" aria-hidden="true">' +
        tabBarEmoji(i) +
        "</span>" +
        '<span class="tab-n">Day ' +
        d.n +
        "</span>" +
        '<span class="tab-d">' +
        d.label.replace(/^\d+月\d+日\s*/, "") +
        "</span>";
      btn.addEventListener("click", () => selectDay(i));
      tabRow.appendChild(btn);
    });

    days.forEach((d, i) => {
      const card = document.createElement("article");
      card.className = "day day-panel" + (i === 0 ? " is-active" : "");
      card.id = "day-panel-" + d.n;
      card.setAttribute("role", "tabpanel");
      card.setAttribute("aria-labelledby", "day-tab-" + d.n);
      card.innerHTML =
        '<div class="day-head">' +
          '<span class="day-tag">Day ' +
          d.n +
          "</span>" +
          '<span class="day-title"><span class="de" aria-hidden="true">' +
          dayCardEmoji(d.n) +
          "</span>" +
          d.title +
          "</span>" +
          '<span class="day-date">' +
          d.label +
          "</span>" +
        "</div>" +
        '<div class="weather-row" data-date="' + d.date + '" data-keys="' + d.wxKeys.join(",") + '"></div>';

      d.blocks.forEach((b) => {
        const sec = document.createElement("section");
        sec.innerHTML =
          "<h3>" +
          sectionHeadingWithEmoji(b.h) +
          "</h3><ul>" +
          b.items.map((x) => "<li>" + x + "</li>").join("") +
          "</ul>";
        card.appendChild(sec);
      });

      const meta = document.createElement("div");
      meta.className = "meta";
      meta.innerHTML =
        "<div><b>🍽️ 餐饮</b> " + d.meals + "</div><div><b>🏨 住宿</b> " + d.hotel + "</div>";
      card.appendChild(meta);

      root.appendChild(card);
    });

    initTripMap();
    selectDay(0);
    requestAnimationFrame(function () {
      if (tripMapState.map) tripMapState.map.invalidateSize();
    });

    (async () => {
      const cache = {};
      try {
        await Promise.all(
          keys.map(async (k) => {
            cache[k] = await fetchCityRange(k, start, end);
          })
        );
      } catch (e) {
        document.querySelectorAll(".weather-row").forEach((row) => {
          row.innerHTML = '<span class="wx err">📡 天气加载失败，请检查网络后刷新页面。</span>';
        });
        return;
      }

      document.querySelectorAll(".weather-row").forEach((row) => {
        const dateStr = row.getAttribute("data-date");
        const wxKeys = row.getAttribute("data-keys").split(",");
        renderWxEl(row, dateStr, wxKeys, cache);
      });
    })();
  </script>
